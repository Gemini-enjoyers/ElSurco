<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - El Surco</title>
    <link rel="stylesheet" th:href="@{/css/register-style.css}">
</head>
<body>

<div class="register-wrapper">
    <div class="form-side">
        <h2 class="title">Crea tu cuenta</h2>
        <p class="subtitle">Únete a la comunidad de El Surco.</p>

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div th:if="${error}" style="background-color: #FADBD8; color: #78281F; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; font-weight: bold;">
                ⚠️ <span th:text="${error}">Mensaje de error</span>
            </div>

            <div class="form-grid">

                <div class="input-group">
                    <label for="userFirstName">Nombre:</label>
                    <input type="text" id="userFirstName" th:field="*{userFirstName}" required>
                </div>

                <div class="input-group">
                    <label for="userLastName">Apellido:</label>
                    <input type="text" id="userLastName" th:field="*{userLastName}" required>
                </div>

                <div class="input-group">
                    <label for="handle">Usuario (Handle):</label>
                    <input type="text" id="handle" th:field="*{handle}" placeholder="@usuario" required>
                </div>

                <div class="input-group">
                    <label for="userPhone">Teléfono:</label>
                    <input type="number" id="userPhone" th:field="*{userPhone}" required>
                </div>

                <div class="input-group full-width">
                    <label for="userEmail">Correo Electrónico:</label>
                    <input type="email" id="userEmail" th:field="*{userEmail}" required>
                </div>

                <div class="input-group full-width">
                    <label for="userAddress">Dirección:</label>
                    <input type="text" id="userAddress" th:field="*{userAddress}" required>
                </div>

                <div class="input-group">
                    <label for="userPassword">Contraseña:</label>
                    <input type="password" id="userPassword" th:field="*{userPassword}" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmar Contraseña:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

            </div>

            <button type="submit" class="register-btn">Registrarse</button>

            <div class="login-text">
                ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
            </div>
        </form>
    </div>

    <div class="image-side">
    </div>
</div>
<script th:src="@{/js/register-validation.js}"></script>
</body>
</html>
