<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Tu Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body>

<!-- ============ NAVBAR ============ -->
<nav>
    <div class="navbar-container">
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>

        <a href="#" class="logo">
            <i class="fas fa-leaf"></i>
            SHOP
        </a>

        <div class="navbar-center">
            <input type="text" class="search-box" placeholder="Buscar productos...">
        </div>

        <div class="navbar-right">
            <div class="nav-icons">
                <i class="fas fa-user nav-icon"></i>
                <div class="nav-icon" style="position: relative;">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ============ OVERLAY ============ -->
<div class="overlay" id="overlay"></div>

<!-- ============ MAIN LAYOUT ============ -->
<div class="layout">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
        <h3 class="sidebar-title">
            <i class="fas fa-bars"></i> Menú
        </h3>

        <ul class="menu-list">
            <li class="menu-item">
                <a href="#" class="menu-link active" data-category="all">
                    <i class="fas fa-th"></i> Todos los Productos
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="verdura">
                    <i class="fas fa-leaf"></i> Verdura
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="fruta">
                    <i class="fas fa-apple-alt"></i> Fruta
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="hierbas">
                    <i class="fas fa-clover"></i> Hierbas y Hojas
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="granos">
                    <i class="fas fa-cube"></i> Granos
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="especias">
                    <i class="fas fa-mortar-pestle"></i> Especias
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="abarroteria">
                    <i class="fas fa-box"></i> Abarrotería
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="otros">
                    <i class="fas fa-ellipsis-h"></i> Otros
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" data-category="mayoreo">
                    <i class="fas fa-warehouse"></i> Mayoreo
                </a>
            </li>
        </ul>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content">
        <div class="products-header">
            <h1 id="categoryTitle">Todos los Productos</h1>
            <select class="sort-select">
                <option value="">Ordenar por...</option>
                <option value="price-low">Precio: Menor a Mayor</option>
                <option value="price-high">Precio: Mayor a Menor</option>
                <option value="name">Nombre A-Z</option>
                <option value="newest">Más Nuevos</option>
            </select>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Productos se cargarán aquí con JavaScript -->
        </div>
    </main>

</div>

<script src="/js/shop.js"></script>

</body>
</html>
