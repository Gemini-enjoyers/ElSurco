<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Surco - Mis Pedidos</title>
</head>
<body>

<!-- Menú de Navegación del Módulo -->
<nav>
    <h1>🌱 El Surco</h1>
    <p>Módulo de Compras</p>
</nav>

<main>
    <!-- Encabezado de la Sección -->
    <header>
        <h2>Historial de Órdenes de Compra</h2>
        <p>Control e historial basado en el registro interno de transacciones.</p>
    </header>

    <!-- Tabla del Historial de Órdenes -->
    <section>
        <table border="1">
            <thead>
            <tr>
                <th>ID Orden</th>
                <th>Fecha de Compra</th>
                <th>Producto (idProduct)</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th>Pago</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="tabla-orders-body">
            <!-- Los datos dinámicos provenientes del backend se inyectarán en este espacio -->
            </tbody>
        </table>
    </section>

    <!-- Sección del Formulario de Valoración (Representación del Modal) -->
    <section id="modal-valoracion">
        <h3>Dejar una Valoración</h3>
        <p>Tu opinión ayuda a mejorar la comunidad de El Surco.</p>

        <form id="form-valoracion">
            <!-- Campo oculto para relacionar la valoración con el ID de la orden -->
            <input type="hidden" id="modal-order-id" name="orderId">

            <div>
                <label for="puntos">Calificación:</label>
                <select id="puntos" name="puntos">
                    <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
                    <option value="4">⭐⭐⭐⭐ Bueno</option>
                    <option value="3">⭐⭐⭐ Regular</option>
                    <option value="2">⭐⭐ Malo</option>
                    <option value="1">⭐ Pésimo</option>
                </select>
            </div>

            <div>
                <label for="comentario">Comentarios:</label>
                <textarea id="comentario" name="comentario" rows="3" placeholder="¿Cómo estuvo tu producto y la entrega?"></textarea>
            </div>

            <div>
                <button type="button">Cancelar</button>
                <button type="submit">Guardar</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
