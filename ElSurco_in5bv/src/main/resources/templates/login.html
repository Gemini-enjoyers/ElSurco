<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - El Surco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-wrapper">
    <div class="form-side">
        <h2 class="title">Iniciar Sesión</h2>
        <p class="subtitle">Por favor ingresa a tu cuenta.</p>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Tu usuario o correo" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="create-account-text">
                ¿No tienes cuenta? <a th:href="@{/register}">Crear cuenta</a>
            </div>
        </form>
    </div>

    <div class="image-side">
    </div>
</div>

</body>
</html>
