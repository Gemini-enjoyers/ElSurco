<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - El Surco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-wrapper">
    <div class="form-side">
        <h2 class="title">Iniciar Sesión</h2>
        <p class="subtitle">Por favor ingresa a tu cuenta.</p>

        <form th:action="@{/login}" method="post">

            <div th:if="${param.error}" style="background-color: #FADBD8; color: #78281F; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; font-weight: bold;">
                ⚠️ Correo, usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.success}" style="background-color: #D4EFDF; color: #145A32; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; font-weight: bold;">
                ¡Cuenta creada con éxito! Por favor, inicia sesión.
            </div>

            <div class="input-group">
                <label for="username">Correo Electrónico o Usuario:</label>
                <input type="text" id="username" name="username" required placeholder="ejemplo@correo.com o @usuario">
            </div>

            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="login-btn">Ingresar</button>
        </form>
    </div>

    <div class="image-side">
    </div>
</div>

</body>
</html>
